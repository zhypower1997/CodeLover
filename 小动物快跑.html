                            const fx = fw.x + Math.cos(angle) * dist;
                            const fy = fw.y + Math.sin(angle) * dist;
                            const alpha = 1 - t / 2.5;
                            ctx.fillStyle = `${fw.color}${Math.floor(alpha * 255).toString(16).padStart(2, '0')}`;
                            ctx.beginPath();
                            ctx.arc(fx, fy, 4, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                });

                // 彩色灯笼
                const lanternColors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3'];
                for (let i = 0; i < 6; i++) {
                    const lx = 100 + i * 230;
                    ctx.fillStyle = lanternColors[i % 4];
                    ctx.beginPath();
                    ctx.ellipse(lx, 50 + Math.sin(Date.now() * 0.003 + i) * 5, 20, 30, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 灯笼光晕
                    ctx.fillStyle = `${lanternColors[i % 4]}44`;
                    ctx.beginPath();
                    ctx.arc(lx, 50, 40, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 庆典彩带
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 3;
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.moveTo(0, 300);
                for (let i = 0; i < CONFIG.canvasWidth; i += 50) {
                    ctx.lineTo(i, 280 + Math.sin(Date.now() * 0.003 + i * 0.02) * 30);
                }
                ctx.stroke();
                ctx.setLineDash([]);

                // 装饰树
                for (let i = 0; i < 4; i++) {
                    drawFestiveTree(150 + i * 350, 150, 140);
                }

                // 金色地面
                ctx.fillStyle = '#DAA520';
                ctx.fillRect(0, 420, CONFIG.canvasWidth, CONFIG.canvasHeight - 420);
                ctx.fillStyle = '#B8860B';
                for (let i = 0; i < 30; i++) {
                    ctx.beginPath();
                    ctx.arc((i * 67) % CONFIG.canvasWidth, 440 + (i % 4) * 40, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // 绘制草地
        function drawGrass(startX, y, width, color = '#6BBF6B') {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            for (let i = 0; i < width / 15; i++) {
                const gx = startX + i * 15;
                const sway = Math.sin(Date.now() * 0.002 + i * 0.5) * 3;
                ctx.beginPath();
                ctx.moveTo(gx, y + 10);
                ctx.quadraticCurveTo(gx + sway, y, gx, y - 10);
                ctx.stroke();
            }
        }

        // 绘制樱花树
        function drawSakuraTree(x, y, size, color = '#FFB7C5') {
            // 树干
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - 8, y, 16, size * 0.6);
            // 樱花云
            ctx.fillStyle = color;
            for (let i = 0; i < 5; i++) {
                const cx = x + Math.cos(i * 1.2) * size * 0.3;
                const cy = y - size * 0.3 + Math.sin(i * 1.5) * size * 0.2;
                ctx.beginPath();
                ctx.arc(cx, cy, size * 0.25, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.beginPath();
            ctx.arc(x, y - size * 0.4, size * 0.3, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制枫树
        function drawMapleTree(x, y, size) {
            // 树干
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - 10, y, 20, size * 0.5);
            // 枫树（橙红色）
            ctx.fillStyle = '#FF4500';
            for (let i = 0; i < 5; i++) {
                const cx = x + Math.cos(i * 1.2) * size * 0.3;
                const cy = y - size * 0.25 + Math.sin(i * 1.5) * size * 0.2;
                ctx.beginPath();
                ctx.arc(cx, cy, size * 0.22, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = '#FF6347';
            ctx.beginPath();
            ctx.arc(x, y - size * 0.35, size * 0.28, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制松树
        function drawPineTree(x, y, size) {
            // 树干
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - 8, y + size * 0.5, 16, size * 0.5);
            // 松针层
            ctx.fillStyle = '#228B22';
            for (let i = 0; i < 4; i++) {
                const ly = y + size * 0.5 - i * size * 0.2;
                const lw = size * 0.4 - i * size * 0.08;
                ctx.beginPath();
                ctx.moveTo(x - lw, ly);
                ctx.lineTo(x, ly - size * 0.25);
                ctx.lineTo(x + lw, ly);
                ctx.fill();
            }
            // 积雪
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.moveTo(x - size * 0.15, y);
            ctx.lineTo(x, y - size * 0.1);
            ctx.lineTo(x + size * 0.15, y);
            ctx.fill();
        }

        // 绘制魔法花朵
        function drawMagicFlower(x, y) {
            const colors = ['#FF69B4', '#9370DB', '#00CED1', '#FFD700'];
            const color = colors[Math.floor(x / 100) % 4];
            // 茎
            ctx.strokeStyle = '#228B22';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x, y + 50);
            ctx.lineTo(x, y);
            ctx.stroke();
            // 花瓣
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 15;
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2 + Date.now() * 0.001;
                const px = x + Math.cos(angle) * 12;
                const py = y + Math.sin(angle) * 12;
                ctx.beginPath();
                ctx.arc(px, py, 8, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            // 花心
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fill();
        }

        // 绘制庆典树
        function drawFestiveTree(x, y, size) {
            // 树干
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - 12, y + size * 0.5, 24, size * 0.5);
            // 树冠
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 0.5);
            gradient.addColorStop(0, '#228B22');
            gradient.addColorStop(1, '#006400');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.fill();
            // 装饰球
            const ballColors = ['#FF69B4', '#FFD700', '#00CED1', '#FF4500'];
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const bx = x + Math.cos(angle) * size * 0.3;
                const by = y + Math.sin(angle) * size * 0.3;
                ctx.fillStyle = ballColors[i % 4];
                ctx.beginPath();
                ctx.arc(bx, by, 5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.35, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.2, size * 0.3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawTree(x, groundY, height, color) {
            ctx.fillStyle = color;
            // 树干
            ctx.fillRect(x - 5, groundY - height * 0.3, 10, height * 0.3);
            // 树冠
            ctx.beginPath();
            ctx.moveTo(x, groundY - height);
            ctx.lineTo(x - 30, groundY - height * 0.3);
            ctx.lineTo(x + 30, groundY - height * 0.3);
            ctx.fill();
        }

        // ==================== 粒子效果 ====================
        function createParticles(x, y, color, count, type = 'circle') {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10 - 5,
                    life: 1,
                    color,
                    size: Math.random() * 8 + 4,
                    type
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life -= 0.02;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                if (p.type === 'star') {
                    drawStar(p.x, p.y, p.size);
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            });
        }

        // ==================== 动物生成和管理 ====================
        function spawnAnimal() {
            const level = LEVELS[gameState.currentLevel];
            const availableAnimals = level.animals;

            // 根据稀有度加权随机
            const weights = availableAnimals.map(id => {
                const animal = ANIMALS.find(a => a.id === id);
                return 1 / animal.rarity;
            });
            const totalWeight = weights.reduce((a, b) => a + b, 0);
            let random = Math.random() * totalWeight;

            let selectedId = availableAnimals[0];
            for (let i = 0; i < availableAnimals.length; i++) {
                random -= weights[i];
                if (random <= 0) {
                    selectedId = availableAnimals[i];
                    break;
                }
            }

            const animal = ANIMALS.find(a => a.id === selectedId);
            const speedMult = level.speedMult || 1;

            // 随机位置（上方区域）
            const x = Math.random() * (CONFIG.canvasWidth - 100) + 50;
            const y = Math.random() * (CONFIG.animalAreaHeight - 100) + 100;

            animals.push({
                type: selectedId,
                x, y,
                vx: (Math.random() - 0.5) * 4 * speedMult,
                vy: 0,
                frame: Math.random() * 100,
                specialTimer: 0,
                scared: false,
                scaredTimer: 0,
                baseSpeed: animal.speed * speedMult,
                scale: 0.5 + (y / CONFIG.animalAreaHeight) * 0.5 // 远处小，近处大
            });
        }

        function updateAnimals() {
            const level = LEVELS[gameState.currentLevel];
            let speedMult = level.speedMult || 1;

            // 蜂蜜道具：减速30%
            if (isItemActive('honey')) speedMult *= 0.7;
            const musicActive = isItemActive('music');

            animals.forEach((animal, index) => {
                animal.frame++;
                const config = ANIMALS.find(a => a.id === animal.type);

                // 特殊行为
                if (animal.scared) {
                    if (!musicActive) {
                        animal.scaredTimer--;
                        if (animal.scaredTimer <= 0) animal.scared = false;
                    } else {
                        animal.scared = false; // 音乐盒：消除受惊
                    }
                }

                switch (config.special) {
                    case 'dash':
                        // 兔子冲刺
                        animal.specialTimer++;
                        if (animal.specialTimer > 120) {
                            animal.vx = (Math.random() - 0.5) * 15 * speedMult;
                            animal.specialTimer = 0;
                        }
                        break;
                    case 'zigzag':
                        // 仓鼠之字形
                        animal.vx = Math.sin(animal.frame * 0.05) * 6 * speedMult;
                        break;
                    case 'float':
                        // 蝴蝶飘动
                        animal.vy = Math.sin(animal.frame * 0.08) * 2;
                        animal.vx = Math.cos(animal.frame * 0.03) * 3 * speedMult;
                        break;
                    case 'jump':
                        // 青蛙跳跃
                        animal.specialTimer++;
                        if (animal.specialTimer > 60 && Math.abs(animal.vy) < 0.1) {
                            animal.vy = -12;
                        }
                        animal.vy += 0.5;
                        break;
                    case 'follow':
                        // 猫追随网
                        if (player.netFlying) {
                            const dx = player.x - animal.x;
                            animal.vx += Math.sign(dx) * 0.5;
                            animal.vx = Math.max(-5, Math.min(5, animal.vx));
                        }
                        break;
                    case 'flee':
                        // 狐狸逃跑（音乐盒激活时不逃）
                        if (player.netFlying && !animal.scared && !musicActive) {
                            animal.scared = true;
                            animal.scaredTimer = 60;
                            animal.vx = -Math.sign(animal.x - player.x) * 8;
                        }
                        break;
                    case 'high':
                        // 松鼠高处
                        if (animal.y < 300) {
                            animal.vy = Math.abs(animal.vy) + 1;
                        }
                        break;
                    case 'still':
                        // 猫头鹰休息
                        if (animal.frame % 300 < 60) {
                            animal.vx = 0;
                        }
                        break;
                    case 'heavy':
                        // 熊移动慢
                        animal.vx *= 0.95;
                        break;
                    case 'panic':
                        // 鹿受惊
                        if (animal.scared && animal.scaredTimer > 0) {
                            animal.vx *= 1.02;
                        }
                        break;
                    case 'waddle':
                        // 企鹅摇晃
                        animal.vx = Math.sin(animal.frame * 0.1) * 3 * speedMult;
                        break;
                    case 'magic':
                        // 独角兽闪烁
                        if (Math.random() < 0.02) {
                            createParticles(animal.x, animal.y, '#FFD700', 3, 'star');
                        }
                        break;
                }

                // 应用速度
                animal.x += animal.vx;
                animal.y += animal.vy;

                // 边界反弹
                if (animal.x < 50) { animal.x = 50; animal.vx *= -1; }
                if (animal.x > CONFIG.canvasWidth - 50) { animal.x = CONFIG.canvasWidth - 50; animal.vx *= -1; }
                if (animal.y < 80) { animal.y = 80; animal.vy *= -0.5; }
                if (animal.y > CONFIG.animalAreaHeight - 50) { animal.y = CONFIG.animalAreaHeight - 50; animal.vy = 0; }

                // 摩擦力
                animal.vx *= 0.98;

                // 远离网的反应
                if (player.netFlying && !animal.scared) {
                    const dx = animal.x - player.x;
                    const dy = animal.y - player.netY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150 && dist > 0) {
                        animal.vx += (dx / dist) * 2;
                    }
                }
            });

            // 限制动物数量
            while (animals.length > 6) {
                animals.shift();
            }
        }

        function drawAnimals() {
            animals.forEach(animal => {
                drawAnimal(animal.type, animal.x, animal.y, animal.scale, animal.frame);

                // 稀有动物光晕
                const config = ANIMALS.find(a => a.id === animal.type);
                if (config.rarity >= 3) {
                    const gradient = ctx.createRadialGradient(animal.x, animal.y, 0, animal.x, animal.y, config.size * 1.5);
                    gradient.addColorStop(0, 'rgba(255,215,0,0.3)');
                    gradient.addColorStop(1, 'rgba(255,215,0,0)');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(animal.x, animal.y, config.size * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        // ==================== 游戏主循环 ====================
        let lastTime = 0;
        let gameTimer = 0;
        let spawnTimer = 0;

        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            if (!gameState.playing || gameState.paused) {
                requestAnimationFrame(gameLoop);
                return;
            }

            // 更新计时器
            gameTimer += deltaTime;
            spawnTimer += deltaTime;

            // 时间流逝
            if (gameTimer >= 1000) {
                gameTimer -= 1000;
                gameState.timeLeft--;
                document.getElementById('timer').textContent = gameState.timeLeft;
                updateTimerStyle();

                if (gameState.timeLeft <= 0) {
                    endLevel();
                    return;
                }
            }

            // 生成动物
            if (spawnTimer > 2000) {
                spawnTimer = 0;
                if (animals.length < 5) {
                    spawnAnimal();
                }
            }

            // 更新玩家
            updatePlayer();

            // 更新动物
            updateAnimals();

            // 更新网
            updateNet();

            // 更新粒子
            updateParticles();

            // 渲染
            render();

            requestAnimationFrame(gameLoop);
        }

        function updatePlayer() {
            // 惯性移动
            player.x += player.vx;
            player.vx *= CONFIG.playerInertia;

            // 边界
            if (player.x < 50) { player.x = 50; player.vx = 0; }
            if (player.x > CONFIG.canvasWidth - 50) { player.x = CONFIG.canvasWidth - 50; player.vx = 0; }

            // 蓄力
            if (player.charging && !player.cooldown) {
                const chargeTime = Date.now() - player.chargeStart;

                if (chargeTime >= CONFIG.overchargeTime) {
                    // 过力
                    overcharge();
                } else {
                    player.chargePower = Math.min(chargeTime / CONFIG.powerMaxTime, 1);
                    document.getElementById('powerFill').style.width = (player.chargePower * 100) + '%';
                }
            }

            // 冷却
            if (player.cooldown) {
                if (Date.now() - player.cooldownStart > CONFIG.cooldownTime) {
                    player.cooldown = false;
                }
            }
        }

        function updateNet() {
            if (!player.netFlying && !player.netReturning) return;

            if (player.netFlying) {
                // 网向上飞
                const maxDistance = player.chargePower * (CONFIG.animalAreaHeight - 150);
                player.netY -= CONFIG.netSpeed;

                // 检测碰撞
                animals.forEach((animal, index) => {
                    const dx = player.x - animal.x;
                    const dy = player.netY - animal.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const animalConfig = ANIMALS.find(a => a.id === animal.type);

                    if (dist < animalConfig.size * animal.scale + 55) {
                        // 捕获成功
                        captureAnimal(animal, index, dist < animalConfig.size * animal.scale * 0.5);
                    }
                });

                // 到达最大距离或抓到动物
                if (player.netHit || player.netY < CONFIG.animalAreaHeight - 150 - maxDistance) {
                    player.netReturning = true;
                    player.netFlying = false;
                }
            }

            if (player.netReturning) {
                player.netY += CONFIG.netReturnSpeed;
                if (player.netY >= CONFIG.playerY) {
                    player.netReturning = false;
                    player.netY = CONFIG.playerY;
                    player.chargePower = 0;
                    document.getElementById('powerFill').style.width = '0%';
                }
            }
        }

        function captureAnimal(animal, index, perfect) {
            const config = ANIMALS.find(a => a.id === animal.type);

            // 计算分数
            const baseScore = config.points * config.rarity;
            const score = perfect ? baseScore * 1.5 : baseScore;
            gameState.score += Math.round(score);
            gameState.captures++;

            if (perfect) {
                gameState.perfectCaptures++;
                createParticles(animal.x, animal.y, '#FFD700', 15, 'star');
                playSound('perfect');
            } else {
                createParticles(animal.x, animal.y, config.color, 10);
                playSound('catch');
            }

            // 稀有度计数
            if (config.rarity >= 3) {
                gameState.rareCaptures++;
                setTimeout(() => playSound('rare'), 200);
            }

            // 检查是否新发现
            if (!gameState.collectedAnimals.includes(animal.type)) {
                gameState.collectedAnimals.push(animal.type);
                showNewAnimalAlert(animal.type);
            }

            // 更新UI
            document.getElementById('score').textContent = gameState.score;
            // 更新分数进度条
            const lvl = LEVELS[gameState.currentLevel];
            const pct = Math.min(gameState.score / lvl.targetScore * 100, 100);
            const fill = document.getElementById('scoreProgressFill');
            fill.style.width = pct + '%';
            // 移除动物
            animals.splice(index, 1);
            player.netHit = true;
            player.netFlying = false;
            player.netReturning = true;

            if (pct >= 100) {
                fill.classList.add('reached');
                // 分数达标，延迟一点让网收回再结算
                setTimeout(() => endLevel(), 600);
                return;
            }

            // 刺猬反弹（30%概率失败）
            if (config.special === 'bounce' && Math.random() < 0.3 && player.chargePower < 0.8) {
                player.cooldown = true;
                player.cooldownStart = Date.now();
                createParticles(player.x, CONFIG.playerY, '#FF6B6B', 8);
                playSound('miss');
            }
        }

        function overcharge() {
            player.charging = false;
            player.cooldown = true;
            player.cooldownStart = Date.now();
            player.chargePower = 0;
            document.getElementById('powerBar').classList.remove('visible');
            document.getElementById('powerFill').style.width = '0%';

            createParticles(player.x, CONFIG.playerY - 50, '#FF6B6B', 15);
            screenShake();
        }

        function screenShake() {
            const container = document.getElementById('gameContainer');
            container.style.transform = 'translateX(5px)';
            setTimeout(() => container.style.transform = 'translateX(-5px)', 50);
            setTimeout(() => container.style.transform = 'translateX(3px)', 100);
            setTimeout(() => container.style.transform = 'translateX(-3px)', 150);
            setTimeout(() => container.style.transform = '', 200);
        }

        function render() {
            ctx.clearRect(0, 0, CONFIG.canvasWidth, CONFIG.canvasHeight);

            drawBackground();
            drawAnimals();
            drawNet();
            drawPlayer();
            drawParticles();
            drawMagnifierPrediction();
        }

        function drawMagnifierPrediction() {
            if (!isItemActive('magnifier')) return;
            if (player.netFlying || player.netReturning) return;

            let chargeFraction = 0;
            if (player.charging) {
                chargeFraction = Math.min((Date.now() - player.chargeStart) / CONFIG.chargeTime, 1);
            }
            const maxDist = Math.max(chargeFraction, 0.3) * (CONFIG.animalAreaHeight - 150);
            const targetY = CONFIG.playerY - 50 - maxDist;

            ctx.save();
            // 虚线轨迹
            ctx.setLineDash([10, 7]);
            ctx.strokeStyle = 'rgba(135, 206, 235, 0.85)';
            ctx.lineWidth = 2.5;
            ctx.shadowColor = '#87CEEB';
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.moveTo(player.x, CONFIG.playerY - 50);
            ctx.lineTo(player.x, targetY);
            ctx.stroke();
            // 目标圈
            ctx.setLineDash([]);
            ctx.strokeStyle = 'rgba(135, 206, 235, 0.7)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(player.x, targetY, 48, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        // ==================== 游戏控制 ====================
        function startGame() {
            initAudio();
            playSound('throw'); // 游戏开始的声音
            gameState.currentLevel = 0;
            initLevel();
        }

        // 更新计时器样式（时间紧迫时警告效果）
        function updateTimerStyle() {
            const timerElement = document.querySelector('.hud-item');
            if (!timerElement) return;

            const level = LEVELS[gameState.currentLevel];
            const timeRatio = gameState.timeLeft / level.time;

            timerElement.classList.remove('warning', 'danger');
            if (timeRatio <= 0.2) {
                timerElement.classList.add('danger');
                if (gameState.timeLeft % 2 === 0) playSound('warningCritical');
            } else if (timeRatio <= 0.4) {
                timerElement.classList.add('warning');
                if (gameState.timeLeft % 5 === 0) playSound('warning');
            }
        }

        function initLevel() {
            const level = LEVELS[gameState.currentLevel];

            // 重置状态
            gameState.playing = true;
            gameState.paused = false;
            gameState.score = 0;
            gameState.timeLeft = level.time;
            gameState.captures = 0;
            gameState.perfectCaptures = 0;
            gameState.rareCaptures = 0;

            // 重置玩家
            player.x = CONFIG.canvasWidth / 2;
            player.vx = 0;
            player.charging = false;
            player.chargePower = 0;
            player.cooldown = false;
            player.netFlying = false;
            player.netReturning = false;
            player.netY = CONFIG.playerY;

            // 清空
            animals = [];
            particles = [];

            // 生成初始动物
            for (let i = 0; i < 4; i++) {
                spawnAnimal();
            }

            // UI
            document.getElementById('score').textContent = '0';
            document.getElementById('targetScore').textContent = level.targetScore;
            document.getElementById('scoreProgressFill').style.width = '0%';
            document.getElementById('scoreProgressFill').classList.remove('reached');
            document.getElementById('timer').textContent = level.time;
            document.getElementById('levelBadge').textContent = level.id;
            document.getElementById('powerFill').style.width = '0%';
            // 重置计时器样式
            const timerElement = document.querySelector('.hud-item');
            if (timerElement) timerElement.classList.remove('warning', 'danger');
            // 重置道具状态并更新道具栏（清除旧计时器防止跨关卡触发）
            Object.values(activeItems).forEach(a => { if (a.timerId) clearTimeout(a.timerId); });
            activeItems = {};
            updateItemBar();

            showScreen('game');
        }

        // ==================== 道具栏 ====================
        function updateItemBar() {
            const bar = document.getElementById('itemBar');
            bar.innerHTML = '';
            ITEMS.forEach(item => {
                const count = gameState.items[item.id] || 0;
                const slot = document.createElement('div');
                const isActive = !!activeItems[item.id];
                slot.className = 'item-slot' + (count === 0 ? ' empty' : '') + (isActive ? ' active-item' : '');
                slot.title = item.name + '：' + item.desc;
                slot.innerHTML = `
                    <svg width="36" height="36" viewBox="0 0 36 36" style="flex-shrink:0;">
                        ${getItemIcon(item.id)}
                    </svg>
                    ${count > 0 ? `<span class="item-count">${count}</span>` : ''}
                    <span class="item-name-label">${item.name}</span>
                `;
                if (count > 0 && !isActive) {
                    const _item = item;
                    const handler = (e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        useItem(_item);
                    };
                    slot.addEventListener('click', handler);
                    slot.addEventListener('touchend', handler);
                }
                bar.appendChild(slot);
            });
        }

        function useItem(item) {
            if ((gameState.items[item.id] || 0) <= 0) return;
            if (activeItems[item.id]) return; // 已在生效中

            gameState.items[item.id]--;
            const timerId = setTimeout(() => {
                if (activeItems[item.id]) delete activeItems[item.id];
                updateItemBar();
            }, item.duration);
            activeItems[item.id] = { startTime: Date.now(), duration: item.duration, timerId };
            updateItemBar();
            saveGame();
            playSound('select');
            // 使用道具视觉提示
            const bar = document.getElementById('itemBar');
            if (bar) {
                bar.style.transform = 'scale(1.08)';
                setTimeout(() => { bar.style.transform = ''; }, 180);
            }
        }

        function isItemActive(itemId) {
            if (!activeItems[itemId]) return false;
            const elapsed = Date.now() - activeItems[itemId].startTime;
            return elapsed < activeItems[itemId].duration;
        }

        function endLevel() {
            gameState.playing = false;

            const level = LEVELS[gameState.currentLevel];
            const targetScore = level.targetScore;
            const scorePercent = gameState.score / targetScore;

            // 计算星星
            let stars = 0;
            if (scorePercent >= 0.5) stars = 1;
            if (scorePercent >= 0.75) stars = 2;
            if (scorePercent >= 1.0) stars = 3;

            // 计算剩余时间奖励
            const timeLeft = Math.max(0, gameState.timeLeft);
            const timeBonus = Math.round(timeLeft * 10); // 每秒剩余时间奖励10金币
            const coinMultiplier = [1, 1.5, 2][stars - 1] || 1;
            const coinsEarned = Math.round(level.targetScore * 0.5 * coinMultiplier) + timeBonus;
            gameState.coins += coinsEarned;

            // 保存进度
            if (!gameState.levelStars[gameState.currentLevel] || gameState.levelStars[gameState.currentLevel] < stars) {
                gameState.levelStars[gameState.currentLevel] = stars;
            }

            // 解锁下一关
            if (stars >= 1 && gameState.currentLevel < LEVELS.length - 1) {
                if (!gameState.unlockedLevels.includes(gameState.currentLevel + 1)) {
                    gameState.unlockedLevels.push(gameState.currentLevel + 1);
                    setTimeout(() => playSound('unlock'), 500);
                }
            }

            saveGame();

            // 播放结算音效
            setTimeout(() => {
                if (stars >= 1) {
                    playSound('levelComplete');
                    setTimeout(() => playSound('coin'), 300);
                } else {
                    playSound('gameOver');
                }
            }, 300);

            // 显示结算
            const passed = gameState.score >= level.targetScore;
            document.getElementById('resultTitle').textContent = passed ? '🎉 通关成功!' : '⏰ 时间到，未通关';
            // 渲染 SVG 星星，依次弹出动画
            const starsEl = document.getElementById('resultStars');
            starsEl.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const lit = i < stars;
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', '0 0 24 24');
                svg.classList.add('star-icon');
                if (lit) {
                    svg.style.animationDelay = (i * 0.18) + 's';
                    svg.classList.add('lit');
                }
                const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                polygon.setAttribute('points', '12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26');
                polygon.setAttribute('fill', lit ? '#FFD700' : '#DDD');
                polygon.setAttribute('stroke', lit ? '#F0A500' : '#BBB');
                polygon.setAttribute('stroke-width', '1');
                svg.appendChild(polygon);
                starsEl.appendChild(svg);
            }
            document.getElementById('resultCapture').textContent = gameState.captures;
            document.getElementById('resultPerfect').textContent = gameState.perfectCaptures;
            document.getElementById('resultRare').textContent = gameState.rareCaptures;
            document.getElementById('resultScore').textContent = gameState.score;
            document.getElementById('resultTimeLeft').textContent = timeLeft + 's';
            document.getElementById('resultCoins').textContent = coinsEarned;
            document.getElementById('timeBonusText').textContent = timeBonus > 0 ? '(含时间奖励 +' + timeBonus + ' 金币)' : '';

            document.getElementById('nextLevelBtn').style.display =
                (stars >= 1 && gameState.currentLevel < LEVELS.length - 1) ? 'block' : 'none';

            showScreen('resultScreen');
        }

        function restartLevel() {
            initLevel();
        }

        function nextLevel() {
            if (gameState.currentLevel < LEVELS.length - 1) {
                gameState.currentLevel++;
                initLevel();
            }
        }

        function exitToMenu() {
            gameState.playing = false;
            gameState.paused = false;
            showScreen('mainMenu');
            updateMenuCoins();
        }

        function togglePause() {
            if (!gameState.playing) return;
            gameState.paused = !gameState.paused;
            document.getElementById('pauseScreen').classList.toggle('visible', gameState.paused);
        }

        // 菜单导航音效包装函数
        function menuNavigate(screenId) {
            initAudio();
            playSound('select');
            showScreen(screenId);
        }

        // ==================== UI管理 ====================
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('visible'));
            document.getElementById('hud').classList.remove('visible');
            document.getElementById('powerBar').classList.remove('visible');
            document.getElementById('itemBar').style.display = 'none';
            document.getElementById('touchArea').style.display = 'none';
            document.getElementById('instructions').style.display = 'none';
            document.getElementById('uiOverlay').classList.remove('active');

            switch(screenId) {
                case 'mainMenu':
                    document.getElementById('mainMenu').classList.add('visible');
                    document.getElementById('uiOverlay').classList.add('active');
                    updateMenuCoins();
                    break;
                case 'levelSelect':
                    document.getElementById('levelSelect').classList.add('visible');
                    document.getElementById('uiOverlay').classList.add('active');
                    updateLevelButtons();
                    break;
                case 'collection':
                    document.getElementById('collection').classList.add('visible');
                    document.getElementById('uiOverlay').classList.add('active');
                    updateCollection();
                    break;
                case 'shop':
                    document.getElementById('shop').classList.add('visible');
                    document.getElementById('uiOverlay').classList.add('active');
                    updateShop();
                    break;
                case 'game':
                    document.getElementById('hud').classList.add('visible');
                    document.getElementById('powerBar').classList.add('visible');
                    document.getElementById('itemBar').style.display = 'flex';
                    document.getElementById('touchArea').style.display = 'block';
                    document.getElementById('instructions').style.display = 'block';
                    document.getElementById('uiOverlay').classList.add('active');
                    break;
                case 'resultScreen':
                    document.getElementById('resultScreen').classList.add('visible');
                    document.getElementById('uiOverlay').classList.add('active');
                    break;
            }

            gameState.screen = screenId;
        }

        function updateMenuCoins() {
            document.getElementById('menuCoins').textContent = gameState.coins;
        }

        function updateLevelButtons() {
            const container = document.getElementById('levelButtons');
            container.innerHTML = '';

            LEVELS.forEach((level, index) => {
                const btn = document.createElement('div');
                btn.className = 'level-btn' + (gameState.unlockedLevels.includes(index) ? '' : ' locked');
                const s = gameState.levelStars[index] || 0;
                const miniStars = [0,1,2].map(i => {
                    const lit = i < s;
                    return `<svg class="mini-star-svg" viewBox="0 0 24 24" width="14" height="14">
                        <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"
                            fill="${lit ? '#FFD700' : '#CCC'}" stroke="${lit ? '#F0A500' : '#BBB'}" stroke-width="1"/>
                    </svg>`;
                }).join('');
                btn.innerHTML = `
                    <div class="level-num">${level.id}</div>
                    <div class="level-stars">${miniStars}</div>
                `;
                if (gameState.unlockedLevels.includes(index)) {
                    btn.onclick = () => {
                        initAudio();
                        playSound('throw');
                        gameState.currentLevel = index;
                        initLevel();
                    };
                }
                container.appendChild(btn);
            });
        }

        function updateCollection() {
            const container = document.getElementById('collectionGrid');
            container.innerHTML = '';
            document.getElementById('collectionCount').textContent = `${gameState.collectedAnimals.length}/${ANIMALS.length}`;

            ANIMALS.forEach(animal => {
                const card = document.createElement('div');
                const collected = gameState.collectedAnimals.includes(animal.id);
                card.className = 'collectible-card' + (collected ? '' : ' locked');

                if (collected) {
                    const miniCanvas = document.createElement('canvas');
                    miniCanvas.className = 'collectible-canvas';
                    miniCanvas.width = 60;
                    miniCanvas.height = 60;
                    drawAnimalIcon(miniCanvas, animal);
                    card.appendChild(miniCanvas);
                } else {
                    card.innerHTML = '<svg width="40" height="40" viewBox="0 0 40 40"><text x="20" y="28" text-anchor="middle" fill="#999" font-size="24">?</text></svg>';
                }

                const name = document.createElement('div');
                name.className = 'collectible-name';
                name.textContent = collected ? animal.name : '???';

        function updateShop() {
            document.getElementById('shopCoins').textContent = gameState.coins;

            const container = document.getElementById('shopGrid');
            container.innerHTML = '';

            ITEMS.forEach(item => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `
                    <div class="shop-item-icon" style="background:${item.color}20;">
                        <svg width="36" height="36" viewBox="0 0 36 36">
                            ${getItemIcon(item.id)}
                        </svg>
                    </div>
                    <div class="shop-item-name">${item.name}</div>
                    <div class="shop-item-price">${item.price} 金币</div>
                    <div style="font-size:11px;color:#888;margin-top:5px;">${item.desc}</div>
                    <div style="font-size:12px;color:#FF6B9D;margin-top:5px;">持有: ${gameState.items[item.id] || 0}</div>
                `;
                div.onclick = () => buyItem(item);
                container.appendChild(div);
            });
        }

        function getItemIcon(id) {
            switch(id) {
                case 'honey':
                    return '<ellipse cx="18" cy="20" rx="10" ry="12" fill="#FFD700"/><ellipse cx="18" cy="10" rx="6" ry="4" fill="#FFA500"/>';
                case 'music':
                    return '<circle cx="18" cy="18" r="12" fill="#FF69B4"/><circle cx="18" cy="18" r="4" fill="#fff"/><rect x="26" y="8" width="2" height="12" fill="#fff"/>';
                case 'magnifier':
                    return '<circle cx="14" cy="14" r="8" stroke="#87CEEB" stroke-width="3" fill="none"/><line x1="20" y1="20" x2="28" y2="28" stroke="#87CEEB" stroke-width="3"/>';
                default:
                    return '';
            }
        }

        function buyItem(item) {
            if (gameState.coins >= item.price) {
                gameState.coins -= item.price;
                gameState.items[item.id] = (gameState.items[item.id] || 0) + 1;
                saveGame();
                updateShop();
            }
        }

        function showNewAnimalAlert(animalId) {
            const animal = ANIMALS.find(a => a.id === animalId);
            const alert = document.getElementById('newAnimalAlert');
            const canvas = document.getElementById('newAnimalCanvas');
            canvas.width = 100;
            canvas.height = 100;
            drawAnimalIcon(canvas, animal);

            document.getElementById('newAnimalName').textContent = animal.name;
            alert.classList.add('visible');

            setTimeout(() => alert.classList.remove('visible'), 2500);
        }

        // ==================== 输入处理 ====================
        document.addEventListener('keydown', e => {
            if (!gameState.playing) return;

            switch(e.code) {
                case 'ArrowLeft':
                case 'KeyA':
                    player.vx -= CONFIG.playerSpeed * 0.3;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    player.vx += CONFIG.playerSpeed * 0.3;
                    break;
                case 'Space':
                    e.preventDefault();
                    if (!player.charging && !player.cooldown && !player.netFlying && !player.netReturning) {
                        player.charging = true;
                        player.chargeStart = Date.now();
                        document.getElementById('powerBar').classList.add('visible');
                    }
                    break;
                case 'Escape':
                case 'KeyP':
                    togglePause();
                    break;
            }
        });

        document.addEventListener('keyup', e => {
            if (!gameState.playing) return;

            if (e.code === 'Space' && player.charging) {
                player.charging = false;

                if (!player.cooldown) {
                    // 发射网
                    playSound('throw');
                    player.netFlying = true;
                    player.netReturning = false;
                    player.netY = CONFIG.playerY - 50;
                    player.netHit = false;
                }

                document.getElementById('powerBar').classList.remove('visible');
            }
        });

        // 触摸控制
        const touchArea = document.getElementById('touchArea');
        let touchStartX = 0;
        let touchCurrentX = 0;

        touchArea.addEventListener('touchstart', e => {
            e.preventDefault();
            if (!gameState.playing || gameState.paused) return;

            touchStartX = e.touches[0].clientX;
            touchCurrentX = touchStartX;

            // 开始蓄力
            if (!player.charging && !player.cooldown && !player.netFlying && !player.netReturning) {
                player.charging = true;
                player.chargeStart = Date.now();
                document.getElementById('powerBar').classList.add('visible');
            }
        });

        touchArea.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!gameState.playing || gameState.paused) return;

            touchCurrentX = e.touches[0].clientX;
            const dx = touchCurrentX - touchStartX;
            player.vx = dx * 0.3;
        });

        touchArea.addEventListener('touchend', e => {
            e.preventDefault();
            if (!gameState.playing) return;

            // 释放蓄力
            if (player.charging) {
                player.charging = false;

                if (!player.cooldown) {
                    player.netFlying = true;
                    player.netReturning = false;
                    player.netY = CONFIG.playerY - 50;
                    player.netHit = false;
                }

                document.getElementById('powerBar').classList.remove('visible');
            }

            player.vx *= 0.5;
        });

        // ==================== 数据存储 ====================
        function saveGame() {
            const data = {
                coins: gameState.coins,
                unlockedLevels: gameState.unlockedLevels,
                levelStars: gameState.levelStars,
                collectedAnimals: gameState.collectedAnimals,
                items: gameState.items
            };
            localStorage.setItem('animalRunnerSave', JSON.stringify(data));
        }

        function loadGame() {
            const saved = localStorage.getItem('animalRunnerSave');
            if (saved) {
                const data = JSON.parse(saved);
                gameState.coins = data.coins || 0;
                gameState.unlockedLevels = data.unlockedLevels || [0];
                gameState.levelStars = data.levelStars || {};
                gameState.collectedAnimals = data.collectedAnimals || [];
                gameState.items = data.items || {};
            }
        }

        // ==================== 音效系统 ====================
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 播放音效函数
        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            try {
                const ctx = audioCtx;
                const now = ctx.currentTime;

                switch(type) {
                    case 'throw':
                        // 发射网：上升的滑音
                        playTone(300, 0.3, 'triangle', 0.15, now, [0, 500, 0.1]);
                        break;
                    case 'catch':
                        // 捕获：清脆的叮声
                        playTone(880, 0.15, 'sine', 0.2, now);
                        playTone(1100, 0.1, 'sine', 0.15, now + 0.1);
                        break;
                    case 'perfect':
                        // 完美捕获：欢快的叮咚声
                        playTone(523, 0.1, 'sine', 0.2, now);
                        playTone(659, 0.1, 'sine', 0.2, now + 0.12);
                        playTone(784, 0.15, 'sine', 0.2, now + 0.24);
                        break;
                    case 'rare':
                        // 稀有动物：魔法音效
                        playTone(440, 0.1, 'sine', 0.2, now);
                        playTone(554, 0.1, 'sine', 0.2, now + 0.08);
                        playTone(659, 0.1, 'sine', 0.2, now + 0.16);
                        playTone(880, 0.2, 'sine', 0.25, now + 0.24);
                        break;
                    case 'miss':
                        // 失误：低沉的提示音
                        playTone(200, 0.2, 'sawtooth', 0.1, now, [200, 100, 0.15]);
                        break;
                    case 'warning':
                        // 警告：短促提示
                        playTone(440, 0.08, 'square', 0.08, now);
                        break;
                    case 'warningCritical':
                        // 紧急警告：更急促
                        playTone(880, 0.05, 'square', 0.1, now);
                        break;
                    case 'levelComplete':
                        // 关卡完成：胜利音乐
                        playTone(523, 0.15, 'sine', 0.2, now);
                        playTone(659, 0.15, 'sine', 0.2, now + 0.18);
                        playTone(784, 0.15, 'sine', 0.2, now + 0.36);
                        playTone(1047, 0.4, 'sine', 0.25, now + 0.54);
                        break;
                    case 'gameOver':
                        // 游戏结束：下沉的音调
                        playTone(400, 0.2, 'sine', 0.15, now, [400, 200, 0.3]);
                        playTone(300, 0.3, 'sine', 0.15, now + 0.25);
                        break;
                    case 'select':
                        // 按钮点击：清脆短促
                        playTone(660, 0.05, 'sine', 0.1, now);
                        break;
                    case 'coin':
                        // 金币：叮咚声
                        playTone(1200, 0.08, 'sine', 0.15, now);
                        playTone(1500, 0.1, 'sine', 0.12, now + 0.08);
                        break;
                    case 'unlock':
                        // 解锁：上升音阶
                        playTone(440, 0.1, 'sine', 0.15, now);
                        playTone(554, 0.1, 'sine', 0.15, now + 0.12);
                        playTone(659, 0.15, 'sine', 0.18, now + 0.24);
                        break;
                }
            } catch(e) {
                console.log('Audio error:', e);
            }
        }

        // 播放单个音调
        function playTone(freq, duration, waveType = 'sine', volume = 0.2, startTime = 0, envelope = null) {
            if (!audioCtx || !soundEnabled) return;
            try {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = waveType;
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);

                if (envelope) {
                    // 频率包络 [起始频率, 结束频率, 持续时间]
                    oscillator.frequency.linearRampToValueAtTime(envelope[0], audioCtx.currentTime + startTime);
                    oscillator.frequency.linearRampToValueAtTime(envelope[1], audioCtx.currentTime + startTime + envelope[2]);
                }

                gainNode.gain.setValueAtTime(0, audioCtx.currentTime + startTime);
                gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + startTime + 0.01);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + startTime + duration);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start(audioCtx.currentTime + startTime);
                oscillator.stop(audioCtx.currentTime + startTime + duration + 0.1);
            } catch(e) {}
        }

        // 初始化
        loadGame();
        updateMenuCoins();

        // 启动游戏循环
        requestAnimationFrame(gameLoop);

        // 初始渲染主菜单背景
        function renderMenuBackground() {
            if (gameState.screen === 'mainMenu') {
                ctx.clearRect(0, 0, CONFIG.canvasWidth, CONFIG.canvasHeight);

                // 渐变背景
                const gradient = ctx.createLinearGradient(0, 0, 0, CONFIG.canvasHeight);
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(0.5, '#98FB98');
                gradient.addColorStop(1, '#90EE90');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, CONFIG.canvasWidth, CONFIG.canvasHeight);

                // 云朵
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                const time = Date.now() * 0.01;
                drawCloud(100 + Math.sin(time * 0.5) * 20, 150, 50);
                drawCloud(300 + Math.sin(time * 0.3) * 30, 100, 60);
                drawCloud(550 + Math.sin(time * 0.4) * 25, 180, 45);

                // 装饰动物
                const frame = Date.now() * 0.05;
                drawAnimal('rabbit', 150, 600, 0.8, frame);
                drawAnimal('cat', 600, 700, 0.9, frame + 20);
                drawAnimal('fox', 400, 900, 1, frame + 40);

                // 草地
                ctx.fillStyle = '#7CCD7C';
                ctx.fillRect(0, CONFIG.canvasHeight - 200, CONFIG.canvasWidth, 200);
            }
            requestAnimationFrame(renderMenuBackground);
        }
        renderMenuBackground();

        document.getElementById('closeBtn').addEventListener('click', () => {
            const { ipcRenderer } = require('electron');
            ipcRenderer.send('close-game');
        });

        // 同步主题
        if (localStorage.getItem('monkey_theme') === 'dark') {
            document.body.classList.add('theme-dark');
        }
    </script>
</body>
</html>
