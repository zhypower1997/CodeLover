<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>礼物商店</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(255,160,185,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(255,160,185,0.35); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,160,185,0.55); }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #fff5f7 0%, #fdf0f5 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: #5a3a4a;
    }

    /* 标题栏 */
    .titlebar {
      background: rgba(255,245,248,0.95);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
      border-bottom: 1px solid rgba(255,160,185,0.4);
      box-shadow: 0 2px 12px rgba(255,140,170,0.1);
      flex-shrink: 0;
    }
    .titlebar-title {
      font-size: 14px;
      font-weight: 600;
      color: #c03050;
      letter-spacing: 0.3px;
    }
    .titlebar-close {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid rgba(255,160,185,0.6);
      background: rgba(255,180,180,0.35);
      color: #c03050;
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }
    .titlebar-close:hover {
      background: rgba(220,80,100,0.7);
      border-color: #ff8080;
      color: #fff;
      transform: scale(1.1);
    }

    /* 顶部金币栏 */
    .coin-header {
      background: rgba(255,245,248,0.85);
      border-bottom: 1px solid rgba(255,160,185,0.25);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .coin-display {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 18px;
      background: rgba(255,183,197,0.2);
      border-radius: 50px;
      border: 1px solid rgba(255,160,185,0.4);
      box-shadow: 0 2px 12px rgba(255,140,170,0.12), inset 0 1px 0 rgba(255,255,255,0.6);
    }
    .coin-icon {
      font-size: 22px;
      animation: coinFloat 2s ease-in-out infinite;
    }
    @keyframes coinFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .coin-amount {
      font-size: 22px;
      font-weight: bold;
      background: linear-gradient(135deg, #e0607a 0%, #c03050 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .coin-income {
      font-size: 12px;
      color: rgba(192,96,120,0.75);
      text-align: right;
    }
    .coin-income span { color: #c03050; font-weight: bold; }

    /* 商品列表 */
    .shop-container {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px;
    }
    .shop-title {
      font-size: 14px;
      color: #c03050;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .gift-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .gift-item {
      background: rgba(255,255,255,0.85);
      border-radius: 14px;
      padding: 16px 10px;
      text-align: center;
      border: 1px solid rgba(255,160,185,0.25);
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .gift-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #FFB7C5, #fff, #FFB7C5);
      transform: scaleX(0);
      transition: transform 0.3s;
    }
    .gift-item:hover::before { transform: scaleX(1); }
    .gift-item:hover {
      transform: translateY(-4px);
      border-color: rgba(255,160,185,0.55);
      box-shadow: 0 8px 28px rgba(255,140,170,0.2), 0 0 15px rgba(255,160,185,0.1);
    }
    .gift-item.owned {
      border-color: rgba(100,200,130,0.4);
      background: rgba(240,255,245,0.85);
    }
    .gift-item.owned::after {
      content: '✓';
      position: absolute;
      top: 8px; right: 8px;
      width: 18px; height: 18px;
      background: #5ab87a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: white;
    }
    .gift-emoji {
      font-size: 38px;
      margin-bottom: 10px;
      display: block;
      transition: transform 0.3s;
    }
    .gift-item:hover .gift-emoji { transform: scale(1.12); }
    .gift-name {
      font-size: 13px;
      color: #5a3a4a;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .gift-desc {
      font-size: 10px;
      color: rgba(160,80,100,0.65);
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .gift-price {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,160,185,0.15);
      color: #c03050;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      border: 1px solid rgba(255,160,185,0.3);
    }
    .gift-price.owned { color: #5ab87a; background: rgba(100,200,130,0.12); border-color: rgba(100,200,130,0.3); }

    /* 底部说明 */
    .shop-footer {
      padding: 14px 20px;
      background: rgba(255,245,248,0.9);
      border-top: 1px solid rgba(255,160,185,0.2);
      flex-shrink: 0;
    }
    .income-rules h4 {
      font-size: 13px;
      color: #c03050;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .income-rules ul {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    .income-rules li {
      padding: 6px 10px;
      background: rgba(255,255,255,0.8);
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(255,160,185,0.15);
      font-size: 11px;
      color: rgba(160,80,100,0.85);
      transition: border-color 0.2s;
    }
    .income-rules li:hover { border-color: rgba(255,160,185,0.35); }
    .coin-reward {
      color: #c03050;
      font-weight: bold;
      background: rgba(255,160,185,0.15);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
    }

    /* 购买弹窗 */
    .buy-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,200,215,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(4px);
    }
    .buy-modal.show { opacity: 1; pointer-events: auto; }
    .buy-modal .content {
      background: linear-gradient(180deg, #fff5f7 0%, #fdf0f5 100%);
      padding: 30px 28px;
      border-radius: 20px;
      width: 300px;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      border: 1px solid rgba(255,160,185,0.5);
      box-shadow: 0 20px 50px rgba(255,140,170,0.25), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .buy-modal.show .content { transform: scale(1); }
    .buy-modal .gift-preview {
      font-size: 64px;
      margin-bottom: 14px;
      animation: giftBounce 0.5s ease-out;
    }
    @keyframes giftBounce {
      0% { transform: scale(0); }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .buy-modal h3 { font-size: 18px; margin-bottom: 6px; color: #c03050; }
    .buy-modal p { font-size: 12px; color: rgba(160,80,100,0.65); margin-bottom: 16px; }
    .buy-modal .price {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 22px;
      color: #c03050;
    }
    .buy-modal .buttons { display: flex; gap: 10px; }
    .buy-modal button {
      flex: 1; padding: 12px;
      border: none; border-radius: 12px;
      font-size: 14px; cursor: pointer;
      transition: all 0.2s; font-weight: 600;
    }
    .buy-modal .btn-cancel {
      background: rgba(255,255,255,0.7);
      color: #a06070;
      border: 1px solid rgba(255,160,185,0.3);
    }
    .buy-modal .btn-cancel:hover { background: rgba(255,240,245,0.9); }
    .buy-modal .btn-buy {
      background: linear-gradient(135deg, #FFB7C5 0%, #FF9AAF 100%);
      color: #fff;
      border: 1px solid #FF9AAF;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
    }
    .buy-modal .btn-buy:hover { background: linear-gradient(135deg, #FF9AAF 0%, #FF7A9A 100%); transform: translateY(-1px); }
    .buy-modal .btn-buy:disabled { background: rgba(200,180,190,0.4); border-color: rgba(200,180,190,0.3); cursor: not-allowed; }

    /* Toast */
    .toast {
      position: fixed;
      top: 80px; left: 50%;
      transform: translateX(-50%) translateY(-15px);
      background: rgba(255,255,255,0.97);
      color: #c03050;
      padding: 10px 22px;
      border-radius: 25px;
      font-size: 13px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 2000;
      border: 1px solid rgba(255,160,185,0.4);
      box-shadow: 0 6px 24px rgba(255,140,170,0.2);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: linear-gradient(135deg, rgba(230,255,240,0.97) 0%, rgba(210,245,225,0.97) 100%); border-color: rgba(100,200,130,0.4); color: #3a8a5a; }
    .toast.error { background: linear-gradient(135deg, rgba(255,220,225,0.97) 0%, rgba(255,200,210,0.97) 100%); border-color: rgba(255,120,140,0.4); color: #c03050; }
    .svg-icon {
      display: inline-block;
      background-color: currentColor;
      -webkit-mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center;
      vertical-align: middle;
      flex-shrink: 0;
    }

    /* ===== 黑金主题 ===== */
    body.theme-dark {
      background: linear-gradient(180deg, #1c1508 0%, #100c02 100%);
      color: #F5C518;
    }
    body.theme-dark ::-webkit-scrollbar-track { background: rgba(160,118,0,0.05); }
    body.theme-dark ::-webkit-scrollbar-thumb { background: rgba(160,130,50,0.25); }
    body.theme-dark ::-webkit-scrollbar-thumb:hover { background: rgba(160,130,50,0.4); }
    body.theme-dark .titlebar {
      background: rgba(14,10,2,0.98);
      border-bottom-color: rgba(160,130,50,0.28);
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    body.theme-dark .titlebar-title { color: #b89840; }
    body.theme-dark .titlebar-close {
      background: rgba(160,130,50,0.1);
      border-color: rgba(160,130,50,0.38);
      color: #b89840;
    }
    body.theme-dark .titlebar-close:hover {
      background: rgba(180,138,10,0.55);
      border-color: #b89840;
      color: #1c1508;
    }
    body.theme-dark .coin-header {
      background: rgba(14,10,2,0.97);
      border-bottom-color: rgba(160,130,50,0.12);
    }
    body.theme-dark .coin-display {
      background: rgba(160,130,50,0.08);
      border-color: rgba(160,130,50,0.28);
      box-shadow: 0 2px 12px rgba(0,0,0,0.35), inset 0 1px 0 rgba(170,138,55,0.07);
    }
    body.theme-dark .coin-amount {
      background: linear-gradient(135deg, #F5C518 0%, #b89840 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    body.theme-dark .coin-income { color: rgba(160,130,50,0.65); }
    body.theme-dark .coin-income span { color: #b89840; }
    body.theme-dark .shop-title { color: #b89840; }
    body.theme-dark .gift-item {
      background: rgba(20,15,3,0.98);
      border-color: rgba(160,130,50,0.12);
    }
    body.theme-dark .gift-item::before {
      background: linear-gradient(90deg, #b89840, rgba(160,130,50,0.25), #b89840);
    }
    body.theme-dark .gift-item:hover {
      border-color: rgba(160,130,50,0.42);
      box-shadow: 0 8px 28px rgba(0,0,0,0.4), 0 0 15px rgba(160,130,50,0.06);
    }
    body.theme-dark .gift-item.owned {
      border-color: rgba(160,130,50,0.4);
      background: rgba(30,22,5,0.92);
    }
    body.theme-dark .gift-item.owned::after {
      background: #b89840;
    }
    body.theme-dark .gift-name { color: #F5C518; }
    body.theme-dark .gift-desc { color: rgba(160,130,50,0.6); }
    body.theme-dark .gift-price {
      background: rgba(160,130,50,0.08);
      color: #b89840;
      border-color: rgba(160,130,50,0.25);
    }
    body.theme-dark .gift-price.owned {
      color: #b89840;
      background: rgba(160,118,0,0.12);
      border-color: rgba(160,130,50,0.25);
    }
    body.theme-dark .shop-footer {
      background: rgba(14,10,2,0.98);
      border-top-color: rgba(160,130,50,0.12);
    }
    body.theme-dark .income-rules h4 { color: #b89840; }
    body.theme-dark .income-rules li {
      background: rgba(20,15,3,0.96);
      border-color: rgba(160,130,50,0.09);
      color: rgba(160,130,50,0.75);
    }
    body.theme-dark .income-rules li:hover { border-color: rgba(160,130,50,0.32); }
    body.theme-dark .coin-reward {
      color: #b89840;
      background: rgba(160,130,50,0.08);
    }
    body.theme-dark .buy-modal { background: rgba(8,6,1,0.88); }
    body.theme-dark .buy-modal .content {
      background: linear-gradient(180deg, #1c1508 0%, #120e02 100%);
      border-color: rgba(160,130,50,0.32);
      box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 1px 0 rgba(170,138,55,0.08);
    }
    body.theme-dark .buy-modal h3 { color: #b89840; }
    body.theme-dark .buy-modal p { color: rgba(160,130,50,0.6); }
    body.theme-dark .buy-modal .price { color: #b89840; }
    body.theme-dark .buy-modal .btn-cancel {
      background: rgba(22,17,5,0.85);
      color: #9a7c20;
      border-color: rgba(160,130,50,0.25);
    }
    body.theme-dark .buy-modal .btn-cancel:hover { background: rgba(36,28,8,0.92); }
    body.theme-dark .buy-modal .btn-buy {
      background: linear-gradient(135deg, #9a7c20 0%, #6a5410 100%);
      border-color: #9a7c20;
    }
    body.theme-dark .buy-modal .btn-buy:hover {
      background: linear-gradient(135deg, #9a8030 0%, #7a6018 100%);
    }
    body.theme-dark .toast {
      background: rgba(16,12,2,0.98);
      color: #b89840;
      border-color: rgba(160,130,50,0.35);
      box-shadow: 0 6px 24px rgba(0,0,0,0.45);
    }
    body.theme-dark .toast.success {
      background: rgba(18,14,3,0.97);
      border-color: rgba(160,130,50,0.35);
      color: #b89840;
    }
    body.theme-dark .toast.error {
      background: rgba(28,14,8,0.97);
      border-color: rgba(180,80,30,0.4);
      color: #d4804a;
    }
    /* icon 颜色 */
    body.theme-dark .svg-icon { background-color: #b89840; }
    body.theme-dark [style*="background-color:#c03050"],
    body.theme-dark [style*="background-color: #c03050"] {
      background-color: #b89840 !important;
    }
  </style>
</head>
<body>
  <!-- 标题栏 -->
  <div class="titlebar">
    <span class="titlebar-title"><span class="svg-icon" style="width:14px;height:14px;-webkit-mask-image:url('svg/shopping.svg');mask-image:url('svg/shopping.svg');margin-right:6px"></span>礼物商店</span>
    <button class="titlebar-close" onclick="window.close()">✕</button>
  </div>

  <!-- 顶部金币栏 -->
  <div class="coin-header">
    <div class="coin-display">
      <span class="coin-icon">🪙</span>
      <span class="coin-amount" id="coinAmount">0</span>
    </div>
    <div class="coin-income">
      今日收益: +<span id="todayIncome">0</span> 🪙
    </div>
  </div>

  <!-- 商品列表 -->
  <div class="shop-container">
    <div class="shop-title"><span style="display:inline-block;width:16px;height:16px;background-color:#c03050;-webkit-mask-image:url('svg/gift.svg');mask-image:url('svg/gift.svg');-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;vertical-align:middle"></span><span>精选礼物</span></div>
    <div class="gift-grid" id="giftGrid"></div>
  </div>

  <!-- 底部说明 -->
  <div class="shop-footer">
    <div class="income-rules">
      <h4>💰 金币获取方式</h4>
      <ul>
        <li><span>每日登录</span><span class="coin-reward">+50 🪙</span></li>
        <li><span>在线活跃（每小时）</span><span class="coin-reward">+10 🪙</span></li>
        <li><span>发送消息</span><span class="coin-reward">+2 🪙</span></li>
        <li><span>收到回复</span><span class="coin-reward">+3 🪙</span></li>
        <li><span>记录心情</span><span class="coin-reward">+5 🪙</span></li>
        <li><span>一起听歌</span><span class="coin-reward">+8 🪙</span></li>
      </ul>
    </div>
  </div>

  <!-- 购买弹窗 -->
  <div class="buy-modal" id="buyModal">
    <div class="content">
      <div class="gift-preview" id="modalGiftEmoji">🎁</div>
      <h3 id="modalGiftName">礼物名称</h3>
      <p id="modalGiftDesc">礼物描述</p>
      <div class="price" id="modalPrice">🪙 100</div>
      <div class="buttons">
        <button class="btn-cancel" onclick="closeBuyModal()">取消</button>
        <button class="btn-buy" id="buyBtn" onclick="confirmBuy()">购买</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const GIFTS = [
      { id: 'rose',      emoji: '🌹', name: '红玫瑰',   desc: '代表热烈的爱意',   price: 50,  affection: 10  },
      { id: 'chocolate', emoji: '🍫', name: '巧克力',   desc: '甜蜜的滋味',       price: 30,  affection: 5   },
      { id: 'coffee',    emoji: '☕', name: '咖啡',     desc: '提神醒脑',         price: 20,  affection: 3   },
      { id: 'book',      emoji: '📖', name: '书籍',     desc: '知识的礼物',       price: 80,  affection: 15  },
      { id: 'music',     emoji: '🎵', name: '音乐盒',   desc: '美妙的旋律',       price: 60,  affection: 8   },
      { id: 'cat',       emoji: '🐱', name: '猫咪玩偶', desc: '像墨墨一样可爱',   price: 100, affection: 20  },
      { id: 'star',      emoji: '⭐', name: '星星',     desc: '摘颗星星给你',     price: 150, affection: 25  },
      { id: 'crown',     emoji: '👑', name: '皇冠',     desc: '你是我的女王',     price: 200, affection: 35  },
      { id: 'ring',      emoji: '💍', name: '戒指',     desc: '永恒的承诺',       price: 500, affection: 100 },
    ];

    const COIN_KEY = 'monkey_coins';
    const INVENTORY_KEY = 'monkey_inventory';
    const INCOME_KEY = 'monkey_income';
    let selectedGift = null;

    function getCoins() {
      const data = localStorage.getItem(COIN_KEY);
      return data ? JSON.parse(data) : { amount: 100, lastUpdate: Date.now() };
    }
    function saveCoins(coins) {
      localStorage.setItem(COIN_KEY, JSON.stringify(coins));
    }
    function getInventory() {
      const data = localStorage.getItem(INVENTORY_KEY);
      return data ? JSON.parse(data) : {};
    }
    function saveInventory(inv) {
      localStorage.setItem(INVENTORY_KEY, JSON.stringify(inv));
    }
    function getTodayIncome() {
      const data = localStorage.getItem(INCOME_KEY);
      const today = new Date().toDateString();
      if (data) {
        const income = JSON.parse(data);
        if (income.date === today) return income.amount;
      }
      return 0;
    }
    function addCoins(amount, source) {
      const coins = getCoins();
      coins.amount += amount;
      coins.lastUpdate = Date.now();
      saveCoins(coins);
      const today = new Date().toDateString();
      const incomeData = localStorage.getItem(INCOME_KEY);
      let income = { date: today, amount: 0 };
      if (incomeData) {
        income = JSON.parse(incomeData);
        if (income.date !== today) income = { date: today, amount: 0 };
      }
      income.amount += amount;
      localStorage.setItem(INCOME_KEY, JSON.stringify(income));
      updateCoinDisplay();
    }
    function spendCoins(amount) {
      const coins = getCoins();
      if (coins.amount >= amount) {
        coins.amount -= amount;
        coins.lastUpdate = Date.now();
        saveCoins(coins);
        updateCoinDisplay();
        return true;
      }
      return false;
    }
    function updateCoinDisplay() {
      document.getElementById('coinAmount').textContent = getCoins().amount;
      document.getElementById('todayIncome').textContent = getTodayIncome();
    }
    function buyGift(giftId) {
      const gift = GIFTS.find(g => g.id === giftId);
      if (!gift) return;
      const coins = getCoins();
      if (coins.amount < gift.price) {
        showToast('金币不足哦～再多聊聊天吧', 'error');
        return;
      }
      selectedGift = gift;
      document.getElementById('modalGiftEmoji').textContent = gift.emoji;
      document.getElementById('modalGiftName').textContent = gift.name;
      document.getElementById('modalGiftDesc').textContent = gift.desc;
      document.getElementById('modalPrice').innerHTML = `🪙 <span style="background:linear-gradient(135deg,#e0607a,#c03050);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${gift.price}</span>`;
      document.getElementById('buyBtn').disabled = coins.amount < gift.price;
      document.getElementById('buyModal').classList.add('show');
    }
    function confirmBuy() {
      if (!selectedGift) return;
      if (spendCoins(selectedGift.price)) {
        const inventory = getInventory();
        if (!inventory[selectedGift.id]) {
          inventory[selectedGift.id] = { count: 0, gift: { ...selectedGift } };
        }
        inventory[selectedGift.id].count++;
        saveInventory(inventory);
        showToast(`成功购买 ${selectedGift.name}！`, 'success');
        renderGiftGrid();
      } else {
        showToast('金币不足', 'error');
      }
      closeBuyModal();
    }
    function closeBuyModal() {
      document.getElementById('buyModal').classList.remove('show');
      selectedGift = null;
    }
    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
    function renderGiftGrid() {
      const inventory = getInventory();
      document.getElementById('giftGrid').innerHTML = GIFTS.map(gift => {
        const owned = inventory[gift.id] ? inventory[gift.id].count : 0;
        return `
          <div class="gift-item ${owned > 0 ? 'owned' : ''}" onclick="buyGift('${gift.id}')">
            <span class="gift-emoji">${gift.emoji}</span>
            <div class="gift-name">${gift.name}</div>
            <div class="gift-desc">${gift.desc}</div>
            <div class="gift-price ${owned > 0 ? 'owned' : ''}">
              🪙 ${gift.price}${owned > 0 ? ` (${owned})` : ''}
            </div>
          </div>`;
      }).join('');
    }
    function checkOnlineReward() {
      const coins = getCoins();
      const now = Date.now();
      const hourMs = 3600000;
      if (now - coins.lastUpdate > hourMs) {
        const reward = Math.min(Math.floor((now - coins.lastUpdate) / hourMs) * 10, 50);
        if (reward > 0) {
          addCoins(reward, '在线活跃');
          showToast(`在线奖励 +${reward} 🪙`, 'success');
        }
      }
    }
    function checkDailyLogin() {
      const lastLoginKey = 'monkey_last_login';
      const today = new Date().toDateString();
      if (localStorage.getItem(lastLoginKey) !== today) {
        addCoins(50, '每日登录');
        localStorage.setItem(lastLoginKey, today);
        showToast('每日登录奖励 +50 🪙', 'success');
      }
    }

    updateCoinDisplay();
    renderGiftGrid();
    checkDailyLogin();
    checkOnlineReward();
    setInterval(checkOnlineReward, 60000);

    // 同步主题
    if (localStorage.getItem('monkey_theme') === 'dark') {
      document.body.classList.add('theme-dark');
    }
  </script>
</body>
</html>
