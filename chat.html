<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>恋人代码</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; -ms-overflow-style: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at 75% 35%, rgba(180, 150, 60, 0.06) 0%, transparent 45%),
        radial-gradient(circle at 25% 70%, rgba(120, 100, 40, 0.05) 0%, transparent 40%),
        linear-gradient(180deg, #0a0a0a 0%, #0d0d0d 55%, #0a0a0a 100%);
      color: #e8ddbf;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }
    /* ===== 会话面板：常驻在立绘右侧、聊天框左侧 ===== */
    .session-panel {
      position: absolute;
      top: 16px;
      bottom: 24px;
      right: calc(20px + 46% + 10px);
      width: 155px;
      z-index: 2;
      background: rgba(10,10,10,0.62);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(189,161,102,0.32);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 6px 30px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,223,154,0.06);
    }
    /* 左下角金色光晕 */
    .session-panel::before {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -40px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 30% 70%,
        rgba(212, 175, 80, 0.18) 0%,
        rgba(189, 140, 40, 0.08) 35%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 0;
    }
    .session-panel-header {
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(189, 161, 102, 0.22);
      flex-shrink: 0;
    }
    .session-panel-header span {
      color: #e8d7ad;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .new-chat-btn {
      width: calc(100% - 24px);
      margin: 10px 12px 10px;
      padding: 9px;
      background: linear-gradient(180deg, #5b4a2d 0%, #46381f 100%);
      border: 1px solid #bca26a;
      border-radius: 8px;
      color: #f1e5c7;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: inset 0 1px 0 rgba(255, 238, 193, 0.25), 0 2px 10px rgba(0, 0, 0, 0.35);
      white-space: nowrap;
    }
    .new-chat-btn:hover {
      transform: translateY(-1px);
      border-color: #d5bc86;
      background: linear-gradient(180deg, #665434 0%, #4f3f24 100%);
    }
    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
    }

    /* ===== 金色纹理背景层 ===== */
    .texture-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .texture-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.08;
      mix-blend-mode: luminosity;
      filter: saturate(1.4) brightness(0.75);
    }
    /* ===== 立绘尺寸背景层（立绘与纹理之间） ===== */
    .character-texture-bg {
      position: absolute;
      bottom: 0;
      left: -60px;
      width: 480px;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .character-texture-bg img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 1;
      mix-blend-mode: luminosity;
      filter: saturate(1.6) brightness(0.7);
    }
    /* ===== 立绘：固定在左下角 ===== */
    .character-bg {
      position: absolute;
      bottom: 0;
      left: -30px;
      width: 480px;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .character-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: bottom left;
      filter: saturate(0.88) brightness(0.82);
    }
    .session-item {
      padding: 10px 12px;
      margin: 4px 0;
      border-radius: 8px;
      color: #ccb98f;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
      position: relative;
    }
    .session-item:hover {
      background: rgba(151, 125, 76, 0.2);
      color: #f0e2c2;
    }
    .session-item.active {
      background: linear-gradient(180deg, rgba(96, 76, 43, 0.55) 0%, rgba(72, 57, 33, 0.48) 100%);
      color: #f5e7c7;
      box-shadow: inset 0 0 0 1px rgba(189, 161, 102, 0.45);
    }
    .session-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-item .delete-btn {
      opacity: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: rgba(119, 46, 46, 0.92);
      color: #f1d9d9;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .session-item:hover .delete-btn { opacity: 1; }
    .session-item .delete-btn:hover { background: rgba(147, 50, 50, 1); }
    /* 主内容区 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    /* 主内容区内部横向分栏：左侧信息栏 + 右侧聊天栏 */
    .main-body {
      flex: 1;
      min-height: 0;
      position: relative;
      z-index: 1;
    }
    /* ===== 左侧：亲密度信息栏，绝对定位在左下角 ===== */
    .left-panel {
      position: absolute;
      bottom: 24px;
      left: 24px;
      width: 200px;
      z-index: 2;
    }
    /* ===== 右侧：聊天框矩形，绝对定位在右侧 ===== */
    .chat-col {
      position: absolute;
      top: 16px;
      right: 20px;
      bottom: 24px;
      width: 46%;
      display: flex;
      flex-direction: column;
      z-index: 2;
      background: rgba(10,10,10,0.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(189,161,102,0.35);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,223,154,0.07);
    }
    .header {
      background: rgba(15,15,15,0.6);
      color: #e8d7ad;
      padding: 11px 18px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
      border-bottom: 1px solid rgba(189, 161, 102, 0.3);
      -webkit-app-region: drag;
      user-select: none;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .close-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(189, 161, 102, 0.7);
      background: rgba(120, 40, 40, 0.5);
      color: #f1d9d9;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
      line-height: 1;
    }
    .close-btn:hover {
      background: rgba(180, 50, 50, 0.85);
      border-color: #e08080;
      transform: scale(1.1);
    }
    .diary-link-btn {
      padding: 5px 12px;
      background: rgba(84, 67, 39, 0.45);
      border: 1px solid rgba(189, 161, 102, 0.7);
      border-radius: 15px;
      color: #e9dab4;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diary-link-btn:hover { background: rgba(105, 83, 49, 0.55); }
    .header-actions { display: flex; gap: 8px; align-items: center; -webkit-app-region: no-drag; }
    .action-btn {
      padding: 5px 12px;
      background: rgba(84, 67, 39, 0.45);
      border: 1px solid rgba(189, 161, 102, 0.7);
      border-radius: 15px;
      color: #e9dab4;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover { background: rgba(105, 83, 49, 0.55); }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: transparent;
      min-height: 0;
    }
    .message {
      max-width: 78%;
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .message.ai {
      background: linear-gradient(180deg, rgba(15, 15, 15, 0.82) 0%, rgba(10, 10, 10, 0.88) 100%);
      color: #e8ddc2;
      align-self: flex-start;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid rgba(189, 161, 102, 0.42);
      box-shadow: inset 0 1px 0 rgba(255, 223, 154, 0.1), 0 4px 20px rgba(0,0,0,0.45);
    }
    .message.user {
      background:
        radial-gradient(ellipse at 50% 30%,
          rgba(212, 175, 80, 0.28) 0%,
          rgba(160, 120, 40, 0.12) 45%,
          transparent 72%
        ),
        linear-gradient(180deg, rgba(95, 72, 35, 0.90) 0%, rgba(55, 42, 18, 0.94) 100%);
      color: #f5ecd4;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      border: 1px solid rgba(212, 175, 80, 0.65);
      box-shadow:
        inset 0 1px 0 rgba(255, 220, 120, 0.28),
        0 4px 18px rgba(0,0,0,0.4),
        0 0 12px rgba(180, 140, 50, 0.12);
    }
    .message.loading { opacity: 0.6; font-style: italic; }
    .welcome {
      text-align: center;
      color: #c7b58f;
      padding: 40px 20px;
    }
    .welcome .emoji { font-size: 48px; margin-bottom: 15px; }
    .mood-area {
      padding: 8px 16px;
      background: rgba(15,15,15,0.5);
      border-top: 1px solid rgba(189, 161, 102, 0.2);
      display: flex;
      align-items: center;
      gap: 15px;
      flex-shrink: 0;
    }
    .mood-area-label { font-size: 12px; color: #ccb98f; white-space: nowrap; }
    .mood-buttons { display: flex; gap: 10px; }
    .mood-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(189, 161, 102, 0.7);
      background: rgba(25, 25, 25, 0.75);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mood-btn:hover {
      transform: scale(1.08);
      border-color: #d8c18d;
      background: rgba(50, 38, 18, 0.8);
    }
    .mood-btn:active { transform: scale(0.95); }
    .mood-toast {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(180deg, rgba(25, 25, 25, 0.97) 0%, rgba(16, 16, 16, 0.97) 100%);
      color: #efe4c7;
      padding: 12px 24px;
      border-radius: 20px;
      font-size: 15px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
      border: 1px solid rgba(189, 161, 102, 0.7);
    }
    .mood-toast.show { opacity: 1; }
    .input-area {
      padding: 12px 16px;
      background: rgba(15,15,15,0.5);
      border-top: 1px solid rgba(189, 161, 102, 0.2);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid rgba(189, 161, 102, 0.45);
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      color: #f2e7cb;
      background: rgba(20, 20, 20, 0.75);
    }
    .input-area input::placeholder { color: rgba(211, 190, 145, 0.72); }
    .input-area input:focus {
      border-color: #d8c18d;
      box-shadow: 0 0 0 2px rgba(186, 160, 101, 0.2);
    }
    .send-btn {
      padding: 12px 20px;
      background: linear-gradient(180deg, #5d4b2c 0%, #45371f 100%);
      border: 1px solid #bca26a;
      border-radius: 25px;
      color: #f2e7c9;
      font-weight: 600;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 234, 182, 0.22);
    }
    .send-btn:hover {
      background: linear-gradient(180deg, #6a5533 0%, #4f3f24 100%);
    }
    .empty-sidebar {
      text-align: center;
      color: #ae9b73;
      padding: 20px;
      font-size: 12px;
    }
    /* ===== 礼物按钮 ===== */
    .gift-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(189,161,102,0.6);
      background: linear-gradient(135deg, rgba(95,72,35,0.85) 0%, rgba(55,42,18,0.9) 100%);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s;
      flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255,220,120,0.2), 0 3px 10px rgba(0,0,0,0.35);
    }
    .gift-btn:hover {
      transform: scale(1.08);
      border-color: #d8c18d;
      background: linear-gradient(135deg, rgba(110,84,42,0.9) 0%, rgba(68,52,24,0.95) 100%);
    }
    /* ===== 音乐播放器弹窗 ===== */
    .music-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .music-modal.show { opacity: 1; pointer-events: auto; }
    .music-modal .modal-content {
      background: linear-gradient(180deg, #1a1a1a 0%, #111111 100%);
      color: #e8d7ad;
      padding: 26px 28px;
      border-radius: 20px;
      width: 420px;
      max-width: 90vw;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,223,154,0.07);
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      border: 1px solid rgba(189,161,102,0.4);
    }
    .music-modal.show .modal-content { transform: scale(1); }
    .music-modal .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }
    .music-modal .modal-header h3 {
      font-size: 16px; margin: 0; color: #e8d7ad;
      display: flex; align-items: center; gap: 8px;
    }
    .music-modal .modal-close {
      background: rgba(80,60,30,0.5);
      border: 1px solid rgba(189,161,102,0.4);
      color: #c8b48a; font-size: 16px; cursor: pointer;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: all 0.2s;
    }
    .music-modal .modal-close:hover { background: rgba(120,40,40,0.7); border-color: #e08080; color: #f1d9d9; }
    .music-search {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .music-search input {
      flex: 1; padding: 10px 14px;
      border: 1px solid rgba(189,161,102,0.4); border-radius: 20px;
      background: rgba(20,20,20,0.8); color: #f2e7cb; font-size: 13px; outline: none;
    }
    .music-search input::placeholder { color: rgba(200,180,130,0.5); }
    .music-search input:focus { border-color: #d8c18d; box-shadow: 0 0 0 2px rgba(186,160,101,0.2); }
    .music-search button {
      padding: 10px 16px;
      background: linear-gradient(180deg, #5b4a2d 0%, #46381f 100%);
      border: 1px solid #bca26a; border-radius: 20px;
      color: #f1e5c7; font-size: 13px; cursor: pointer; transition: all 0.2s;
      box-shadow: inset 0 1px 0 rgba(255,238,193,0.2);
    }
    .music-search button:hover { background: linear-gradient(180deg, #665434 0%, #4f3f24 100%); }
    .music-search button:disabled { opacity: 0.5; cursor: not-allowed; }
    .music-list {
      max-height: 260px; overflow-y: auto; margin-bottom: 16px;
    }
    .music-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      transition: all 0.2s; margin-bottom: 6px;
      border: 1px solid transparent;
    }
    .music-item:hover { background: rgba(189,161,102,0.08); border-color: rgba(189,161,102,0.2); }
    .music-item.playing { background: rgba(189,161,102,0.12); border-color: rgba(189,161,102,0.35); }
    .music-item .cover {
      width: 44px; height: 44px; border-radius: 8px;
      background: linear-gradient(135deg, rgba(40,30,15,0.9) 0%, rgba(25,18,8,0.95) 100%);
      border: 1px solid rgba(189,161,102,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .music-item .info { flex: 1; min-width: 0; }
    .music-item .title {
      font-size: 13px; color: #e8d7ad;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
    }
    .music-item .artist {
      font-size: 11px; color: rgba(200,180,130,0.6);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .music-item .play-icon {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(95,72,35,0.85) 0%, rgba(55,42,18,0.9) 100%);
      border: 1px solid rgba(189,161,102,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #f1e5c7; flex-shrink: 0; transition: transform 0.2s;
    }
    .music-item:hover .play-icon { transform: scale(1.08); }
    .music-player-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: rgba(20,20,20,0.7);
      border-radius: 12px; border: 1px solid rgba(189,161,102,0.3);
    }
    .music-player-bar .cover {
      width: 44px; height: 44px; border-radius: 8px;
      background: linear-gradient(135deg, rgba(95,72,35,0.9) 0%, rgba(55,42,18,0.95) 100%);
      border: 1px solid rgba(189,161,102,0.4);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .music-player-bar .info { flex: 1; min-width: 0; }
    .music-player-bar .title {
      font-size: 13px; color: #e8d7ad;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
    }
    .music-player-bar .artist { font-size: 11px; color: rgba(200,180,130,0.6); }
    .music-player-bar .controls { display: flex; gap: 8px; }
    .music-player-bar .control-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid rgba(189,161,102,0.4);
      background: rgba(40,30,15,0.7); color: #c8b48a; font-size: 12px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .music-player-bar .control-btn:hover { background: rgba(95,72,35,0.7); border-color: #d8c18d; }
    .music-player-bar .control-btn.play {
      background: linear-gradient(135deg, #5b4a2d 0%, #46381f 100%);
      border-color: #bca26a; color: #f1e5c7;
    }
    .music-empty { text-align: center; color: rgba(200,180,130,0.5); padding: 30px 20px; font-size: 13px; }
    .music-loading { text-align: center; color: rgba(200,180,130,0.6); padding: 20px; font-size: 13px; }
    /* ===== 礼物选择弹窗 ===== */
    .gift-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000;
      opacity: 0; pointer-events: none;

    }

      background: linear-gradient(180deg, #1a1a1a 0%, #111111 100%);

      padding: 26px 28px;

      transform: scale(0.9);

      border: 1px solid rgba(189,161,102,0.4);
    }
    .gift-modal.show .modal-content { transform: scale(1); }
    .gift-modal .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .gift-modal .modal-header h3 {
      font-size: 16px; margin: 0; color: #e8d7ad;
      display: flex; align-items: center; gap: 8px;
    }
    .gift-modal .modal-close {
      background: rgba(80,60,30,0.5);

<body>

  <script>
    // 引入养成系统
    const {
      addAffection, getProgression, getCurrentStage, getStageProgress,
      addHiddenAffection, addMemory, getMemory, checkMoodKeywords,
      applyPenalty, getMoodModifier, isReconciling, getReconciliationContext
    } = (function() {
      const PROGRESSION_KEY = 'monkey_progression';
      const STAGES = [
        { id: 1, name: '初识', min: 0, max: 100, color: '#E8E8E8' },
        { id: 2, name: '熟悉', min: 101, max: 300, color: '#B8D4E8' },
        { id: 3, name: '暧昧', min: 301, max: 600, color: '#FFB7C5' },
        { id: 4, name: '交往', min: 601, max: 1000, color: '#FF9AAF' },
        { id: 5, name: '结婚', min: 1001, max: 2000, color: '#FFD700' },
        { id: 6, name: '白头偕老', min: 2001, max: Infinity, color: '#FF69B4' }
      ];
      const ACTIONS = {
        firstChat: { stage: 1, points: 5, msg: '今日初见~', type: 'daily' },
        chat: { stage: 2, points: 10, msg: '和你聊天很开心' },
        nightGreeting: { stage: 3, points: 15, msg: '被惦记着真好' },
        expressMiss: { stage: 3, points: 20, msg: '...我也是' },
        playGame: { stage: 3, points: 25, msg: '和你一起很开心' },
        date: { stage: 4, points: 30, msg: '今天的约会很开心' },
        anniversary: { stage: 4, points: 40, msg: '重要的一天' },
        weddingAnniversary: { stage: 5, points: 50, msg: '又一年了呢' },
        dailyTogether: { stage: 5, points: 15, msg: '平凡的每一天' },
        dailyStay: { stage: 6, points: 10, msg: '有你在真好', type: 'daily' },
        // 二次复合路线专属
        reconcileChat: { stage: 1, points: 3, msg: '谢谢你还在...' },
        reconcileApologize: { stage: 1, points: 8, msg: '我愿意重新认识你' }
      };

      // ========== 关键词惩罚配置 ==========
      // extreme: 直接归零，进入二次复合
      // heavy: 大幅扣分，可能导致阶段回退
      // medium: 中度扣分
      // light: 轻微扣分，仅情感波动
      const MOOD_KEYWORDS = {
        extreme: {
          keywords: ['离婚', '分手', '散了吧', '别联系了', '拉黑', '删除', '结束了', '一刀两断', '再见了', '永别', '不爱你了', '不爱了', '不要再见了', '算了吧', '到此为止', '形同陌路', '各走各的', '我们完了', 'game over'],
          penalty: 0, // 直接归零
          aiMsg: '...好。如果这是你的决定。'
        },
        heavy: {
          keywords: ['不想理你', '烦死了', '讨厌你', '滚', '别烦我', '够了', '离我远点', '受够了', '忍够了', '不想和你说话', '别碰我', '不要你了', '后悔认识你', '别出现在我面前'],
          penalty: -80,
          aiMsg: '...好。我安静一点。'
        },
        medium: {
          keywords: ['生气', '不高兴', '不开心', '不爽', '生气了', '你太过分了', '你变了', '失望', '没意思', '心寒', '不在乎我', '不关心我', '冷暴力', '忽视我', '敷衍我'],
          penalty: -30,
          aiMsg: '...对不起。是我哪里做得不好吗？'
        },
        light: {
          keywords: ['哼', '烦', '无聊', '无语', '算了', '不想说', '随便吧', '你猜', '不理你了', '赌气', '小气', '笨蛋', '傻瓜', '讨厌'],
          penalty: -10,
          aiMsg: '...嗯。'
        }
      };

      // ========== 记忆系统 ==========
      function addMemory(key, value) {
        const p = getProgression();
        if (!p.memory) p.memory = [];
        // 同 key 覆盖旧记忆
        p.memory = p.memory.filter(m => m.key !== key);
        p.memory.push({ key, value, timestamp: Date.now() });
        // 最多保留 50 条
        if (p.memory.length > 50) p.memory = p.memory.slice(-50);
        saveProgression(p);
      }

      function getMemory(key) {
        const p = getProgression();
        if (!p.memory) return null;
        return p.memory.find(m => m.key === key) || null;
      }

      // ========== 初始化 / 读写 ==========

        const data = localStorage.getItem(PROGRESSION_KEY);

          breakupCount: 0, breakups: [], isReconciling: false
        };
      }

      function saveProgression(p) { localStorage.setItem(PROGRESSION_KEY, JSON.stringify(p)); }

      function getCurrentStage(affection) {
        for (let i = STAGES.length - 1; i >= 0; i--) {
          if (affection >= STAGES[i].min) return STAGES[i];
        }
        return STAGES[0];
      }

        const stage = getCurrentStage(affection);

        const newStage = getCurrentStage(p.affection);

        if (newStage.id !== oldStage) {
          if (!p.stageHistory) p.stageHistory = [];
          p.stageHistory.push({ stage: newStage.id, date: new Date().toISOString() });

        // 记录负面事件到记忆
        addMemory('lastNegativeEvent', {
          keyword: moodResult.matchedKeyword,
          level: moodResult.level,
          date: new Date().toISOString()
        });

        // 显示惩罚反馈
        if (penaltyApplied.isExtreme) {
          showBreakupToast(penaltyApplied.oldStageName);
        } else {
          showPenaltyToast(penaltyApplied);
        }
        updateProgressionUI();
      } else {
        // 正常加分（二次复合期间使用复合专属行为）
        const action = isReconciling() ? 'reconcileChat' : 'chat';
        const result = addAffection(action);
        if (result) {
          showAffectionGain(result.points, result.message);
          if (result.stageUp) {
            setTimeout(() => showStageUp(result.newStage.name), 500);
          }
          updateProgressionUI();
        }
        // 发送消息获得金币
        addCoins(2, '发送消息');
      }

      // 确保有会话
      if (!currentSessionId) {
        createSession();
      }

      const session = getCurrentSession();

      // 添加用户消息到会话
      session.messages.push({ role: 'user', content: text });
      session.updatedAt = Date.now();

      // 更新标题
      if (session.messages.length === 1) {
        updateSessionTitle(text);
      }

      // 渲染用户消息
      renderMessages();
      messageInput.value = '';

      // 显示加载
      const loadingMsg = document.createElement('div');
      loadingMsg.className = 'message ai loading';
      loadingMsg.textContent = '嗯...';
      chatContainer.appendChild(loadingMsg);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: 'glm-4-flash',
            messages: [
              { role: 'system', content: buildSystemPrompt() },
              // 滑动窗口：只保留最近 20 轮对话（40 条），防止上下文过长导致人设丢失
              ...session.messages.slice(-40).map(m => ({ role: m.role, content: m.content }))
            ],
            stream: false
          })
        });

        const data = await response.json();
        loadingMsg.remove();

        if (data.choices && data.choices[0]) {
          const aiContent = data.choices[0].message.content;
          const currentSession = getCurrentSession();
          if (currentSession) {
            currentSession.messages.push({ role: 'assistant', content: aiContent });
            currentSession.updatedAt = Date.now();
            saveSessions();
            renderMessages();
            // 收到回复获得金币

          loadingMsg.textContent = '嗯...出了点问题';
          loadingMsg.classList.remove('loading');
        }
      } catch (error) {
        loadingMsg.remove();
        const errMsg = document.createElement('div');
        errMsg.className = 'message ai';
        errMsg.textContent = '网络出了点问题，嗯...再试一次？';
        chatContainer.appendChild(errMsg);

    const COIN_KEY = 'monkey_coins';

    function getCoins() {
      const data = localStorage.getItem(COIN_KEY);
      if (data) return JSON.parse(data);
      return { amount: 100, lastUpdate: Date.now() };
    }

    function saveCoins(coins) {
      localStorage.setItem(COIN_KEY, JSON.stringify(coins));
    }

    function addCoins(amount, source) {
      const coins = getCoins();
      coins.amount += amount;
      coins.lastUpdate = Date.now();
      saveCoins(coins);
      const today = new Date().toDateString();
      const incomeData = localStorage.getItem(INCOME_KEY);
      let income = { date: today, amount: 0 };
      if (incomeData) {
        income = JSON.parse(incomeData);
        if (income.date !== today) income = { date: today, amount: 0 };
      }
      income.amount += amount;
      localStorage.setItem(INCOME_KEY, JSON.stringify(income));
      const logs = JSON.parse(localStorage.getItem('monkey_coin_logs') || '[]');
      logs.unshift({ amount, source, time: new Date().toISOString() });
      if (logs.length > 100) logs.pop();
      localStorage.setItem('monkey_coin_logs', JSON.stringify(logs));
      return coins.amount;
    }

    async function searchMusic() {
      const keyword = document.getElementById('musicSearchInput').value.trim();

      const btn = document.getElementById('musicSearchBtn');
      const list = document.getElementById('musicList');

        const response = await fetch(`https://music.163.com/api/search/get?s=${encodeURIComponent(keyword)}&type=1&offset=0&total=true&limit=10`);

    function playMusic(songId, songName, artistName) {
      if (currentMusic && currentMusic.id === songId) { togglePlay(); return; }
      const musicUrl = `https://music.163.com/song/media/outer/url?id=${songId}.mp3`;
      currentMusic = { id: songId, name: songName, artist: artistName, url: musicUrl };
      audioPlayer.src = musicUrl;
      audioPlayer.play();
      isPlaying = true;
      document.getElementById('currentMusicTitle').textContent = songName;
      document.getElementById('currentMusicArtist').textContent = artistName;
      document.getElementById('musicPlayerBar').style.display = 'flex';
      document.getElementById('playBtn').textContent = '⏸';
      updateMusicListUI();
      sendMusicCardMessage(songId, songName, artistName);
      addCoins(8, '一起听歌');

    function togglePlay() {
      if (!currentMusic) return;
      if (isPlaying) {
        audioPlayer.pause(); isPlaying = false;
        document.getElementById('playBtn').textContent = '▶';
      } else {
        audioPlayer.play(); isPlaying = true;
        document.getElementById('playBtn').textContent = '⏸';
      }
      updateMusicListUI();
      updateMusicCardStatus(currentMusic.id, isPlaying);
    }

    function stopMusic() {
      const stoppedMusicId = currentMusic ? currentMusic.id : null;
      audioPlayer.pause(); audioPlayer.currentTime = 0;
      isPlaying = false; currentMusic = null;
      document.getElementById('musicPlayerBar').style.display = 'none';
      updateMusicListUI();
      if (stoppedMusicId) updateMusicCardStatus(stoppedMusicId, false);

      items.forEach(item => {

        if (currentMusic && item.onclick && item.onclick.toString().includes(currentMusic.id)) {
          item.classList.add('playing');
          if (playIcon) playIcon.textContent = isPlaying ? '⏸' : '▶';
        } else {
          item.classList.remove('playing');
          if (playIcon) playIcon.textContent = '▶';
        }
      });
    }

      const cfg = moodConfig[mood];

      const context = buildMoodContext(mood);

      }

    function buildMoodContext(currentMood) {
      const moodData = JSON.parse(localStorage.getItem(MOOD_KEY) || '[]');
      const recentMoods = moodData.slice(0, 7);

      const chatData = JSON.parse(localStorage.getItem('monkey_chat_sessions') || '{"sessions":[]}');
      const recentSessions = chatData.sessions.slice(0, 3);

      let context = `用户刚记录了【${moodConfig[currentMood].label}】心情。\n\n`;

      // 最近话题
      if (recentSessions.length > 0) {
        context += '【最近的对话话题】\n';
        recentSessions.forEach((s, i) => {
          if (s.title && s.title !== '新的对话') {
            context += `${i + 1}. ${s.title}\n`;
          }
        });
      }

      // 最近心情趋势
      if (recentMoods.length > 0) {
        const moodCounts = { happy: 0, neutral: 0, sad: 0 };
        recentMoods.forEach(m => moodCounts[m.mood] = (moodCounts[m.mood] || 0) + 1);
        context += `\n【最近心情】😊${moodCounts.happy}次 😐${moodCounts.neutral}次 😭${moodCounts.sad}次`;
      }

      context += '\n\n请生成一句贴合情境的暖心回复！';
      return context;
    }

      const fill = document.getElementById('progressionFill');
      const stageEl = document.getElementById('progressionStage');
      const pointsEl = document.getElementById('progressionPoints');
      
      fill.style.width = progress + '%';
      fill.style.backgroundColor = stage.color;

      // 阶段名 + 复合标记
      let stageText = stage.name;
      if (p.isReconciling) {
        stageText += '<span class="reconcile-badge">复合中</span>';
      }
      stageEl.innerHTML = stageText;
      pointsEl.textContent = p.affection;
    }

    function showAffectionGain(points, message) {
      const toast = document.getElementById('affectionToast');
      toast.textContent = `💕 +${points} ${message}`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function showPenaltyToast(result) {
      const toast = document.getElementById('penaltyToast');
      toast.textContent = `💔 ${result.penalty} "${result.matchedKeyword}"`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);

      // 阶段下降提示
      if (result.stageDown) {
        setTimeout(() => {
          const downToast = document.getElementById('stageDownToast');
          const textEl = document.getElementById('stageDownText');
          const subEl = document.getElementById('stageDownSub');
          textEl.textContent = `🌧️ 关系退回到 ${result.newStageName}`;
          subEl.textContent = `从 ${result.oldStageName} 降了下来...`;
          downToast.classList.add('show');
          setTimeout(() => downToast.classList.remove('show'), 3000);
        }, 600);
      }
    }

    function showBreakupToast(fromStageName) {
      const toast = document.getElementById('breakupToast');
      const titleEl = document.getElementById('breakupTitle');
      const subEl = document.getElementById('breakupSub');
      const p = getProgression();

      titleEl.textContent = '关系归零';
      subEl.innerHTML = `从「${fromStageName}」回到了原点<br>如果你想重新开始，${p.breakupCount > 0 ? '这次请认真一点' : '我还在这里'}`;

      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function showStageUp(stageName) {
      const toast = document.getElementById('stageUpToast');
      const textEl = document.getElementById('stageUpText');
      const subEl = document.getElementById('stageUpSub');
      
      // 检测是否从复合状态升级
      let subText = '我们的关系更进一步了';
      if (isReconciling()) {
        subText = '我愿意...再相信你一次';
      }
      
      textEl.textContent = `🎉 升级到 ${stageName}！`;
      subEl.textContent = subText;
      
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ===== 初始化 =====
    // 设置顶部昵称
    function updateHeaderName() {
      const profile = getUserProfile();
      const aiName = profile.aiName || '沈砚之';
      document.getElementById('headerLeft').textContent = aiName;
    }
    updateHeaderName();
    updateProgressionUI();

    loadSessions();
    renderMessages();
    messageInput.focus();

  </script>
</body>
</html>
